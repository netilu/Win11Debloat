name: "💡 功能建议"
description: "建议新功能或改进"
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        # 💡 **功能建议**
        感谢你为 Win11Debloat 提出建议！请尽可能提供详细信息，以便我们理解并评估你的想法。

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      description: 提交建议前，请确认以下事项。
      options:
        - label: 我已搜索现有 Issue 和讨论，未发现相同建议。
          required: true

  - type: textarea
    id: description
    attributes:
      label: 功能或改进说明
      description: 请简明描述建议的功能或改进，并说明它为何有必要、能为用户带来什么帮助。
      placeholder: 请描述建议的功能或改进。
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: 示例
      description: 请举例说明该功能可以如何工作或实现。
      placeholder: 例如：代码片段、界面草图或类似功能的实现链接。
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: 补充信息
      description: 在此添加与功能建议有关的其他信息或截图。
      placeholder: 例如：截图、相关讨论链接等。
    validations:
      required: false
